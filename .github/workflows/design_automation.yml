name: CAD Design Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  generate-cad-variants:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install OpenSCAD
      run: |
        sudo apt-get update
        sudo apt-get install -y openscad

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run DoE Design Exploration
      run: python src/scripts/generate_doe.py

    - name: Archive Design Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: design-variants
        path: dist/doe_study_v1/
